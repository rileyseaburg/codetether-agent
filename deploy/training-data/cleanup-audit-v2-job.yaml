apiVersion: batch/v1
kind: Job
metadata:
  name: training-cleanup-audit-v2-cross-object
  namespace: codetether-data
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 3600
  template:
    metadata:
      labels: {app.kubernetes.io/name: training-cleanup-audit-v2}
    spec:
      restartPolicy: Never
      serviceAccountName: training-spark
      containers:
        - name: submit
          image: us-central1-docker.pkg.dev/spotlessbinco/codetether/codetether-training-pipeline:20260723-v16
          command: [/opt/spark/jobs/submit_training_cleanup_k8s.sh]
          env:
            - {name: PIPELINE_IMAGE, value: "us-central1-docker.pkg.dev/spotlessbinco/codetether/codetether-training-pipeline:20260723-v16"}
            - {name: CLEANUP_RUN_ID, value: "cleanup-v2-audit-20260723-20"}
            - {name: CLEANUP_SOURCE_PREFIX, value: "training/v2/2026/07/23/20"}
            - {name: CLEANUP_SOURCE_BEFORE, value: "training/v2/2026/07/23/21/"}
            - {name: CLEANUP_APPLY, value: "false"}
            - {name: CLEANUP_REPROCESS, value: "true"}
