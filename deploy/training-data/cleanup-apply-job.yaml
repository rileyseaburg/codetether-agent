apiVersion: batch/v1
kind: Job
metadata:
  name: training-cleanup-apply-v1
  namespace: codetether-data
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 7200
  template:
    metadata:
      labels: {app.kubernetes.io/name: training-cleanup-apply}
    spec:
      restartPolicy: Never
      serviceAccountName: training-spark
      containers:
        - name: submit
          image: us-central1-docker.pkg.dev/spotlessbinco/codetether/codetether-training-pipeline:20260717-v10
          command: [/opt/spark/jobs/submit_training_cleanup_k8s.sh]
          env:
            - {name: PIPELINE_IMAGE, value: "us-central1-docker.pkg.dev/spotlessbinco/codetether/codetether-training-pipeline:20260717-v10"}
            - {name: CLEANUP_RUN_ID, value: cleanup-v3-20260717}
            - {name: CLEANUP_SOURCE_BEFORE, value: "training/v2/2026/07/17/21/"}
            - {name: CLEANUP_APPLY, value: "true"}
