apiVersion: v1
kind: ConfigMap
metadata:
  name: trino-config
  namespace: codetether-data
data:
  iceberg.properties: |
    connector.name=iceberg
    iceberg.catalog.type=rest
    iceberg.rest-catalog.uri=http://polaris:8181/api/catalog
    iceberg.rest-catalog.warehouse=codetether
    iceberg.rest-catalog.security=OAUTH2
    iceberg.rest-catalog.oauth2.credential=${ENV:POLARIS_CREDENTIAL}
    iceberg.rest-catalog.oauth2.scope=PRINCIPAL_ROLE:ALL
    iceberg.rest-catalog.http-headers=Polaris-Realm: POLARIS
    iceberg.rest-catalog.vended-credentials-enabled=true
    iceberg.rest-catalog.nested-namespace-enabled=true
    fs.s3.enabled=true
    s3.endpoint=http://192.168.50.223:9000
    s3.path-style-access=true
    s3.region=us-east-1
