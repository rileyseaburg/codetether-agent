apiVersion: v1
kind: ServiceAccount
metadata:
  name: training-spark
  namespace: codetether-data
imagePullSecrets:
  - name: quantum-forge-registry
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: training-spark
  namespace: codetether-data
rules:
  - apiGroups: [""]
    resources: [pods, pods/log, services, configmaps, persistentvolumeclaims]
    verbs: [create, get, list, watch, delete, deletecollection, patch, update]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: training-spark
  namespace: codetether-data
subjects:
  - {kind: ServiceAccount, name: training-spark, namespace: codetether-data}
roleRef:
  {apiGroup: rbac.authorization.k8s.io, kind: Role, name: training-spark}
