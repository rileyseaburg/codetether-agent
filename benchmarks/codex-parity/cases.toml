prompt = "Make parse_record robust and panic-free while preserving its typed error variants. It must trim fields and reject missing, empty, or invalid scores. Do not edit tests; run all acceptance checks."
checks = ["cargo test --quiet", "cargo clippy --quiet -- -D warnings"]
protected = ["tests/acceptance.rs"]
timeout_seconds = 300
