name: PR Windows Test EXE

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: pr-windows-test-exe-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-windows-exe:
    name: Build Windows test EXE
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: pr-windows-test-exe

      - name: Build test EXE
        shell: pwsh
        run: cargo build --target x86_64-pc-windows-msvc

      - name: Package test EXE
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "target\x86_64-pc-windows-msvc\debug\codetether.exe" "dist\codetether-pr-test.exe"
          Get-ChildItem dist

      - name: Upload test EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: codetether-windows-pr-test-exe
          path: dist/codetether-pr-test.exe
          if-no-files-found: error
          retention-days: 14
