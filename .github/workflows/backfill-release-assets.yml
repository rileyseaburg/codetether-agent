name: Backfill Release Assets

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to build and upload assets for
        required: true
        default: v4.6.3
        type: string

permissions:
  contents: write

jobs:
  docker:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            file: docker/release/linux.Dockerfile
            output: linux
            binary: codetether
            extension: ""
          - target: x86_64-pc-windows-gnu
            file: docker/release/windows.Dockerfile
            output: windows
            binary: codetether.exe
            extension: .exe
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
      - uses: docker/setup-buildx-action@v3
      - name: Build artifact image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --file "${{ matrix.file }}" \
            --target artifact \
            --output "type=local,dest=dist/${{ matrix.output }}" \
            .
      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          asset="codetether-${{ inputs.tag }}-${{ matrix.target }}"
          mkdir -p packaged
          cp "dist/${{ matrix.output }}/${{ matrix.binary }}" "packaged/${asset}${{ matrix.extension }}"
          chmod 755 "packaged/${asset}"*
          tar -C packaged -czf "packaged/${asset}.tar.gz" "$(basename "packaged/${asset}"*)"
          if [ -z "${{ matrix.extension }}" ]; then
            rm "packaged/${asset}"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: packaged/*
          if-no-files-found: error

  macos:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Ensure protoc
        run: |
          if ! command -v protoc >/dev/null 2>&1; then
            brew install protobuf
          fi
      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }} --bin codetether
      - name: Package artifact
        run: |
          set -euo pipefail
          asset="codetether-${{ inputs.tag }}-${{ matrix.target }}"
          mkdir -p packaged
          cp "target/${{ matrix.target }}/release/codetether" "packaged/${asset}"
          chmod 755 "packaged/${asset}"
          tar -C packaged -czf "packaged/${asset}.tar.gz" "${asset}"
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: packaged/*.tar.gz
          if-no-files-found: error

  upload:
    name: Upload Release Assets
    runs-on: ubuntu-latest
    needs: [docker, macos]
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist
      - name: Upload assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          cd dist
          sha256sum * > "SHA256SUMS-${TAG}.txt"
          gh release upload "${TAG}" ./* --repo "${GITHUB_REPOSITORY}" --clobber
