name: CodeTether Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: codetether-review-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: codetether-agent-k8s
    timeout-minutes: 25
    steps:
      - name: Check eligibility
        id: eligible
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_BODY: ${{ github.event.comment.body || '' }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif printf '%s' "$COMMENT_BODY" | grep -q '@codetether'; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: not a PR event and comment does not mention @codetether"
          fi

      - name: Classify request
        if: steps.eligible.outputs.should_run == 'true'
        id: classify
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_BODY: ${{ github.event.comment.body || '' }}
        run: |
          mode="server"
          body="$(printf '%s' "${COMMENT_BODY}" | tr '\n' ' ' | tr '[:upper:]' '[:lower:]')"
          if [ "$EVENT_NAME" = "pull_request_review_comment" ] && printf '%s' "$body" | grep -Eq '(@codetether([^[:alnum:]_-]|$).*(fix|apply|address|implement|patch))|((fix|apply|address|implement|patch).+@codetether([^[:alnum:]_-]|$))'; then
            mode="local"
          fi
          echo "mode=${mode}" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        if: steps.eligible.outputs.should_run == 'true'
        shell: bash
        env:
          REPO_DIR: ${{ github.workspace }}/repo
          CHECKOUT_REF: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_review_comment') && github.event.pull_request.head.sha || github.sha }}
          RAW_GITHUB_TOKEN: ${{ github.token }}
        run: |
          rm -rf "${REPO_DIR}"
          mkdir -p "${REPO_DIR}"
          git -C "${REPO_DIR}" init .
          git -C "${REPO_DIR}" remote add origin "https://x-access-token:${RAW_GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git -C "${REPO_DIR}" fetch --prune --no-recurse-submodules origin \
            +refs/heads/*:refs/remotes/origin/* \
            +refs/tags/*:refs/tags/*
          git -C "${REPO_DIR}" fetch --no-recurse-submodules origin "${CHECKOUT_REF}"
          git -C "${REPO_DIR}" checkout --force FETCH_HEAD

      # Get a GitHub App installation token so comments come from the bot identity
      - name: Get App Token
        if: steps.eligible.outputs.should_run == 'true'
        uses: actions/create-github-app-token@v3.1.1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: CodeTether Review
        if: steps.eligible.outputs.should_run == 'true'
        uses: rileyseaburg/codetether-action@v1
        with:
          mode: ${{ steps.classify.outputs.mode }}
          token: ${{ secrets.CODETETHER_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}
          vault_addr: ${{ secrets.VAULT_ADDR }}
          vault_token: ${{ secrets.VAULT_TOKEN }}
          model: openai-codex/gpt-5.5
          max_steps: "60"
          task_wait_seconds: "1200"
          workspace_path: ${{ github.workspace }}/repo
