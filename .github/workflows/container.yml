name: Build Container

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: codetether-agent-k8s
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Cargo.lock
        run: cargo generate-lockfile

      - name: Enable sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Configure Docker sccache
        run: echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/codetether-agent
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build_push
        continue-on-error: true
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            RUSTC_WRAPPER=${{ env.RUSTC_WRAPPER }}
            SCCACHE_GHA_ENABLED=true

      # Long (>1h) builds can outlive the buildx session, making the final
      # registry push fail with "DeadlineExceeded: no active session".
      # Retrying immediately reuses the already-built layers (gha cache +
      # local layer store), so this second attempt is effectively push-only
      # with a fresh session.
      - name: Retry push on session expiry
        if: steps.build_push.outcome == 'failure'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          build-args: |
            RUSTC_WRAPPER=${{ env.RUSTC_WRAPPER }}
            SCCACHE_GHA_ENABLED=true