[target.armv7-unknown-linux-gnueabihf]
linker = "arm-linux-gnueabihf-gcc"

[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

[target.x86_64-apple-darwin]
linker = "rust-lld"

[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "link-arg=-fuse-ld=C:\\Program Files\\Mold\\bin\\mold.exe"]

[profile.dev]
incremental = false

# sccache configuration for local development
# Uncomment for local builds with sccache:
# [build]
# rustc-wrapper = "sccache"

# NOTE: sccache env vars are set in Makefile 'be' target for local development.

[env]
# Use sqlx offline metadata in `.sqlx/` so builds and rust-analyzer don't require
# a live DATABASE_URL. Regenerate with `cargo sqlx prepare` when queries change.
SQLX_OFFLINE = "true"
[term]
verbose = false

[cargo]
workspaces = { start = "current" }
